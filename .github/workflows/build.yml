name: NovaRE Win64 Executable Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python Runtime (3.10)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Assembly & AI Core Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyqt6 capstone pefile groq

    - name: Compile and Bundle Code using PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name="NovaRE_AI" main.py

    - name: Archive Executable Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NovaRE-Windows-EXE
        path: dist/NovaRE_AI.exe
